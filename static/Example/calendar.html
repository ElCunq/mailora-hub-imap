<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mailora — Takvim</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/premium.css">
    <style>
        /* Calendar Layout Override */
        .app { grid-template-columns: 260px 1fr; }
        .calendar-main { grid-row: 2; padding: 24px; overflow-y: auto; }

        /* Nav Links */
        .nav-link { padding: 10px 14px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-secondary); transition: var(--transition); margin-bottom: 2px; text-decoration: none; }
        .nav-link:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }
        .nav-link.active { background: rgba(59,130,246,0.15); color: var(--accent-blue); font-weight: 500; }

        /* Calendar Controls */
        .cal-controls { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .cal-title { font-size: 24px; font-weight: 700; min-width: 220px; }
        .cal-nav-btn { background: var(--bg-tertiary); border: 1px solid var(--border); color: var(--text-secondary); width: 36px; height: 36px; border-radius: 10px; cursor: pointer; font-size: 16px; transition: var(--transition); display: flex; align-items: center; justify-content: center; }
        .cal-nav-btn:hover { border-color: var(--accent-blue); color: var(--text-primary); background: rgba(59,130,246,0.1); }
        .cal-today-btn { padding: 8px 16px; background: var(--gradient-primary); color: #fff; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; font-family: inherit; font-size: 13px; transition: var(--transition); }
        .cal-today-btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 15px rgba(59,130,246,0.4); }
        .cal-view-tabs { display: flex; gap: 4px; margin-left: auto; background: var(--bg-tertiary); border-radius: 10px; padding: 3px; border: 1px solid var(--border); }
        .cal-view-tab { padding: 6px 16px; border-radius: 8px; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 500; transition: var(--transition); }
        .cal-view-tab.active { background: var(--gradient-primary); color: #fff; }
        .cal-view-tab:hover:not(.active) { color: var(--text-primary); }

        /* Calendar Grid */
        .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .cal-day-header { padding: 12px 8px; text-align: center; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); background: var(--bg-tertiary); border-bottom: 1px solid var(--border); }
        .cal-cell { min-height: 110px; padding: 8px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); background: var(--bg-secondary); cursor: pointer; transition: var(--transition); position: relative; }
        .cal-cell:nth-child(7n) { border-right: none; }
        .cal-cell:hover { background: rgba(59,130,246,0.05); }
        .cal-cell.other-month { opacity: 0.35; }
        .cal-cell.today { background: rgba(59,130,246,0.08); }
        .cal-cell.today .cal-date { background: var(--gradient-primary); color: #fff; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .cal-date { font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text-secondary); }
        .cal-event { padding: 3px 6px; border-radius: 5px; font-size: 10px; font-weight: 500; margin-bottom: 3px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: var(--transition); }
        .cal-event:hover { filter: brightness(1.2); transform: scale(1.02); }
        .cal-event.blue { background: rgba(59,130,246,0.25); color: #93c5fd; border-left: 3px solid var(--accent-blue); }
        .cal-event.purple { background: rgba(139,92,246,0.25); color: #c4b5fd; border-left: 3px solid var(--accent-purple); }
        .cal-event.green { background: rgba(16,185,129,0.25); color: #6ee7b7; border-left: 3px solid var(--accent-green); }
        .cal-event.red { background: rgba(239,68,68,0.25); color: #fca5a5; border-left: 3px solid var(--accent-red); }
        .cal-event.orange { background: rgba(245,158,11,0.25); color: #fcd34d; border-left: 3px solid var(--accent-orange); }

        /* Mini Calendar in Sidebar */
        .mini-cal { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-top: 16px; }
        .mini-cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .mini-cal-title { font-size: 12px; font-weight: 600; }
        .mini-cal-nav { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 12px; }
        .mini-cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; text-align: center; }
        .mini-cal-day { font-size: 9px; color: var(--text-muted); padding: 2px; font-weight: 600; }
        .mini-cal-date { font-size: 10px; padding: 4px; border-radius: 50%; cursor: pointer; color: var(--text-secondary); transition: var(--transition); }
        .mini-cal-date:hover { background: rgba(59,130,246,0.15); }
        .mini-cal-date.today { background: var(--accent-blue); color: #fff; font-weight: 700; }
        .mini-cal-date.other { opacity: 0.3; }

        /* Upcoming events sidebar */
        .upcoming-list { margin-top: 16px; }
        .upcoming-item { display: flex; gap: 10px; padding: 10px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; cursor: pointer; transition: var(--transition); }
        .upcoming-item:hover { border-color: var(--accent-blue); background: rgba(59,130,246,0.05); }
        .upcoming-dot { width: 4px; border-radius: 2px; flex-shrink: 0; }
        .upcoming-info { flex: 1; min-width: 0; }
        .upcoming-title { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .upcoming-time { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

        /* Event Modal */
        .event-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 1000; }
        .event-modal.open { display: flex; }
        .event-form { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 20px; width: 480px; max-width: 92vw; animation: modalIn .3s ease; }
        .event-form-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .event-form-header h3 { font-size: 16px; font-weight: 600; }
        .event-form-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
        .event-row { display: flex; align-items: center; gap: 12px; }
        .event-row-icon { font-size: 16px; width: 24px; text-align: center; color: var(--text-muted); }
        .event-input { flex: 1; padding: 10px 14px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 10px; color: var(--text-primary); font-family: inherit; font-size: 13px; transition: var(--transition); }
        .event-input:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
        .event-input.title-input { font-size: 18px; font-weight: 600; border: none; background: transparent; padding: 0; }
        .event-input.title-input:focus { box-shadow: none; border-bottom: 2px solid var(--accent-blue); border-radius: 0; }
        .event-textarea { flex: 1; padding: 10px 14px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 10px; color: var(--text-primary); font-family: inherit; font-size: 13px; resize: vertical; min-height: 60px; transition: var(--transition); }
        .event-textarea:focus { outline: none; border-color: var(--accent-blue); }
        .event-select { padding: 10px 14px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 10px; color: var(--text-primary); font-family: inherit; font-size: 13px; cursor: pointer; }
        .color-picker { display: flex; gap: 6px; }
        .color-dot { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: var(--transition); }
        .color-dot:hover, .color-dot.selected { border-color: #fff; transform: scale(1.15); }
        .event-form-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }

        /* Week View */
        .week-view { display: none; }
        .week-grid { display: grid; grid-template-columns: 60px repeat(7,1fr); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .week-time { padding: 8px 4px; font-size: 10px; color: var(--text-muted); text-align: right; border-bottom: 1px solid var(--border); height: 48px; background: var(--bg-tertiary); }
        .week-slot { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); height: 48px; cursor: pointer; transition: var(--transition); position: relative; }
        .week-slot:hover { background: rgba(59,130,246,0.05); }
        .week-slot:nth-child(8n) { border-right: none; }
        .week-day-header { padding: 10px; text-align: center; background: var(--bg-tertiary); border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }
        .week-day-header:last-child { border-right: none; }
        .week-day-name { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
        .week-day-num { font-size: 16px; font-weight: 700; margin-top: 2px; }
        .week-day-header.today .week-day-num { background: var(--accent-blue); color: #fff; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 2px auto 0; }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">✉</div>
                <span class="logo-text">Mailora</span>
            </div>
            <div class="header-actions">
                <button class="compose-btn" onclick="openEventModal()">📅 Yeni Etkinlik</button>
                <button class="icon-btn" id="theme-btn" onclick="toggleTheme()" title="Tema">🌙</button>
            </div>
        </header>

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="section-label">Navigasyon</div>
            <a href="index.html" class="nav-link">📥 Inbox</a>
            <a href="calendar.html" class="nav-link active">📅 Takvim</a>
            <a href="sheets.html" class="nav-link">📊 Tablo</a>
            <a href="admin.html" class="nav-link">🛡️ Admin Panel</a>

            <div id="mini-calendar"></div>

            <div class="section-label" style="margin-top:20px">Yaklaşan Etkinlikler</div>
            <div class="upcoming-list" id="upcoming-list"></div>
        </aside>

        <!-- Main Calendar -->
        <div class="calendar-main">
            <div class="cal-controls">
                <button class="cal-nav-btn" onclick="changeMonth(-1)">◀</button>
                <button class="cal-today-btn" onclick="goToday()">Bugün</button>
                <button class="cal-nav-btn" onclick="changeMonth(1)">▶</button>
                <div class="cal-title" id="cal-title"></div>
                <div class="cal-view-tabs">
                    <button class="cal-view-tab active" onclick="switchView('month',this)">Ay</button>
                    <button class="cal-view-tab" onclick="switchView('week',this)">Hafta</button>
                </div>
            </div>
            <div id="month-view">
                <div class="cal-grid" id="cal-grid"></div>
            </div>
            <div class="week-view" id="week-view"></div>
        </div>
    </div>

    <!-- Event Modal -->
    <div class="event-modal" id="event-modal">
        <div class="event-form">
            <div class="event-form-header">
                <h3>📅 Yeni Etkinlik</h3>
                <button class="modal-close" onclick="closeEventModal()">✕</button>
            </div>
            <div class="event-form-body">
                <div class="event-row">
                    <input type="text" class="event-input title-input" id="ev-title" placeholder="Etkinlik adı ekleyin">
                </div>
                <div class="event-row">
                    <span class="event-row-icon">🕐</span>
                    <input type="date" class="event-input" id="ev-date">
                    <input type="time" class="event-input" id="ev-start" style="max-width:120px">
                    <span style="color:var(--text-muted)">—</span>
                    <input type="time" class="event-input" id="ev-end" style="max-width:120px">
                </div>
                <div class="event-row">
                    <span class="event-row-icon">🔁</span>
                    <select class="event-select" id="ev-repeat">
                        <option value="none">Tekrarlanma</option>
                        <option value="daily">Her gün</option>
                        <option value="weekly">Her hafta</option>
                        <option value="monthly">Her ay</option>
                    </select>
                </div>
                <div class="event-row">
                    <span class="event-row-icon">📍</span>
                    <input type="text" class="event-input" id="ev-location" placeholder="Konum ekle">
                </div>
                <div class="event-row">
                    <span class="event-row-icon">📝</span>
                    <textarea class="event-textarea" id="ev-desc" placeholder="Açıklama ekle"></textarea>
                </div>
                <div class="event-row">
                    <span class="event-row-icon">🎨</span>
                    <div class="color-picker">
                        <div class="color-dot selected" style="background:var(--accent-blue)" data-color="blue" onclick="pickColor(this)"></div>
                        <div class="color-dot" style="background:var(--accent-purple)" data-color="purple" onclick="pickColor(this)"></div>
                        <div class="color-dot" style="background:var(--accent-green)" data-color="green" onclick="pickColor(this)"></div>
                        <div class="color-dot" style="background:var(--accent-red)" data-color="red" onclick="pickColor(this)"></div>
                        <div class="color-dot" style="background:var(--accent-orange)" data-color="orange" onclick="pickColor(this)"></div>
                    </div>
                </div>
            </div>
            <div class="event-form-footer">
                <button class="toolbar-btn" onclick="closeEventModal()">İptal</button>
                <button class="send-btn" onclick="saveEvent()">💾 Kaydet</button>
            </div>
        </div>
    </div>

    <script>
        // State
        let currentDate = new Date();
        let currentView = 'month';
        let selectedColor = 'blue';
        let events = [];
        try { events = JSON.parse(localStorage.getItem('mailora-events') || '[]'); } catch(e) { events = []; }

        // Demo events
        if (events.length === 0) {
            const today = new Date();
            const y = today.getFullYear(), m = today.getMonth();
            events = [
                { id: 1, title: 'Sprint Planlama', date: `${y}-${String(m+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`, start: '10:00', end: '11:30', color: 'blue', location: 'Zoom', desc: 'Q2 sprint planlama toplantısı' },
                { id: 2, title: 'Tasarım Review', date: `${y}-${String(m+1).padStart(2,'0')}-${String(today.getDate()+2).padStart(2,'0')}`, start: '14:00', end: '15:00', color: 'purple', location: 'Ofis', desc: '' },
                { id: 3, title: 'Doktor Randevusu', date: `${y}-${String(m+1).padStart(2,'0')}-${String(today.getDate()+5).padStart(2,'0')}`, start: '09:00', end: '10:00', color: 'red', location: 'Hastane', desc: '' },
                { id: 4, title: 'Müşteri Demo', date: `${y}-${String(m+1).padStart(2,'0')}-${String(today.getDate()+1).padStart(2,'0')}`, start: '16:00', end: '17:00', color: 'green', location: 'Google Meet', desc: 'Yeni dashboard demosu' },
                { id: 5, title: 'Doğum Günü Partisi 🎂', date: `${y}-${String(m+1).padStart(2,'0')}-${String(Math.min(today.getDate()+7,28)).padStart(2,'0')}`, start: '19:00', end: '23:00', color: 'orange', location: 'Ev', desc: '' },
                { id: 6, title: 'AI Model Eğitimi', date: `${y}-${String(m+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`, start: '14:00', end: '16:00', color: 'purple', location: 'MailoraPro Lab', desc: 'Konu modeli v4 eğitimi' },
            ];
            localStorage.setItem('mailora-events', JSON.stringify(events));
        }

        const months = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
        const daysShort = ['Pzr','Pzt','Sal','Çar','Per','Cum','Cmt'];
        const daysFull = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];

        function render() {
            renderTitle();
            renderMonthGrid();
            renderMiniCalendar();
            renderUpcoming();
        }

        function renderTitle() {
            document.getElementById('cal-title').textContent = `${months[currentDate.getMonth()]} ${currentDate.getFullYear()}`;
        }

        function renderMonthGrid() {
            const grid = document.getElementById('cal-grid');
            const year = currentDate.getFullYear(), month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrev = new Date(year, month, 0).getDate();
            const today = new Date();

            let html = daysShort.map(d => `<div class="cal-day-header">${d}</div>`).join('');

            // Previous month
            for (let i = firstDay - 1; i >= 0; i--) {
                html += `<div class="cal-cell other-month"><div class="cal-date">${daysInPrev - i}</div></div>`;
            }

            // Current month
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === d;
                const dayEvents = events.filter(e => e.date === dateStr);
                const evHtml = dayEvents.map(e => {
                    const safeTitle = (e.title||'').replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    return `<div class="cal-event ${e.color}" title="${safeTitle} (${e.start||''}-${e.end||''})" data-eid="${e.id}">${e.start ? e.start+' ' : ''}${e.title}</div>`;
                }).join('');
                html += `<div class="cal-cell ${isToday?'today':''}" data-date="${dateStr}"><div class="cal-date">${d}</div>${evHtml}</div>`;
            }

            // Next month fill
            const totalCells = firstDay + daysInMonth;
            const remaining = (7 - totalCells % 7) % 7;
            for (let i = 1; i <= remaining; i++) {
                html += `<div class="cal-cell other-month"><div class="cal-date">${i}</div></div>`;
            }

            grid.innerHTML = html;

            // Bind click events after render
            grid.querySelectorAll('.cal-cell:not(.other-month)').forEach(cell => {
                cell.addEventListener('click', function(e) {
                    if (e.target.closest('.cal-event')) {
                        // Clicked on an event - show its details
                        const eid = parseInt(e.target.closest('.cal-event').dataset.eid);
                        const ev = events.find(x => x.id === eid);
                        if (ev) alert(`${ev.title}\n${ev.start||''} - ${ev.end||''}\n📍 ${ev.location||'—'}\n${ev.desc||''}`);
                    } else {
                        // Clicked on empty area - create new event
                        openEventModal(cell.dataset.date);
                    }
                });
            });
        }

        function renderMiniCalendar() {
            const mc = document.getElementById('mini-calendar');
            const year = currentDate.getFullYear(), month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrev = new Date(year, month, 0).getDate();
            const today = new Date();

            let html = `<div class="mini-cal">
                <div class="mini-cal-header">
                    <button class="mini-cal-nav" onclick="changeMonth(-1)">◀</button>
                    <span class="mini-cal-title">${months[month]} ${year}</span>
                    <button class="mini-cal-nav" onclick="changeMonth(1)">▶</button>
                </div>
                <div class="mini-cal-grid">`;
            daysShort.forEach(d => html += `<div class="mini-cal-day">${d[0]}${d[1]}</div>`);

            for (let i = firstDay - 1; i >= 0; i--) {
                html += `<div class="mini-cal-date other">${daysInPrev - i}</div>`;
            }
            for (let d = 1; d <= daysInMonth; d++) {
                const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === d;
                html += `<div class="mini-cal-date ${isToday?'today':''}">${d}</div>`;
            }
            html += `</div></div>`;
            mc.innerHTML = html;
        }

        function renderUpcoming() {
            const list = document.getElementById('upcoming-list');
            const today = new Date().toISOString().split('T')[0];
            const upcoming = events.filter(e => e.date >= today).sort((a,b) => a.date.localeCompare(b.date) || (a.start||'').localeCompare(b.start||'')).slice(0,5);
            list.innerHTML = upcoming.map(e => {
                const d = new Date(e.date);
                return `<div class="upcoming-item">
                    <div class="upcoming-dot" style="background:var(--accent-${e.color})"></div>
                    <div class="upcoming-info">
                        <div class="upcoming-title">${e.title}</div>
                        <div class="upcoming-time">${d.getDate()} ${months[d.getMonth()]} • ${e.start||''} ${e.location ? '📍'+e.location : ''}</div>
                    </div>
                </div>`;
            }).join('') || '<div style="font-size:12px;color:var(--text-muted);padding:8px">Yaklaşan etkinlik yok</div>';
        }

        function changeMonth(delta) { currentDate.setMonth(currentDate.getMonth() + delta); render(); }
        function goToday() { currentDate = new Date(); render(); }

        function switchView(view, btn) {
            currentView = view;
            document.querySelectorAll('.cal-view-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('month-view').style.display = view === 'month' ? 'block' : 'none';
            document.getElementById('week-view').style.display = view === 'week' ? 'block' : 'none';
            if (view === 'week') renderWeekView();
        }

        function renderWeekView() {
            const wv = document.getElementById('week-view');
            const today = new Date();
            const startOfWeek = new Date(today); startOfWeek.setDate(today.getDate() - today.getDay());

            let html = '<div class="week-grid"><div class="cal-day-header" style="background:var(--bg-tertiary)"></div>';
            for (let i = 0; i < 7; i++) {
                const d = new Date(startOfWeek); d.setDate(startOfWeek.getDate() + i);
                const isToday = d.toDateString() === today.toDateString();
                html += `<div class="week-day-header ${isToday?'today':''}"><div class="week-day-name">${daysShort[i]}</div><div class="week-day-num">${d.getDate()}</div></div>`;
            }
            for (let h = 8; h <= 20; h++) {
                html += `<div class="week-time">${String(h).padStart(2,'0')}:00</div>`;
                for (let i = 0; i < 7; i++) {
                    const d = new Date(startOfWeek); d.setDate(startOfWeek.getDate() + i);
                    const dateStr = d.toISOString().split('T')[0];
                    const ev = events.find(e => e.date === dateStr && e.start && parseInt(e.start) === h);
                    html += `<div class="week-slot" onclick="openEventModal('${dateStr}')">${ev ? `<div class="cal-event ${ev.color}" style="margin:2px">${ev.title}</div>` : ''}</div>`;
                }
            }
            html += '</div>';
            wv.innerHTML = html;
        }

        function openEventModal(dateStr) {
            document.getElementById('event-modal').classList.add('open');
            if (dateStr) document.getElementById('ev-date').value = dateStr;
            else document.getElementById('ev-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('ev-title').focus();
        }

        function closeEventModal() {
            document.getElementById('event-modal').classList.remove('open');
            ['ev-title','ev-date','ev-start','ev-end','ev-location','ev-desc'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('ev-repeat').value = 'none';
        }

        function pickColor(el) {
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
            el.classList.add('selected');
            selectedColor = el.dataset.color;
        }

        function saveEvent() {
            const title = document.getElementById('ev-title').value.trim();
            if (!title) { alert('Lütfen etkinlik adı girin'); return; }
            events.push({
                id: Date.now(),
                title,
                date: document.getElementById('ev-date').value,
                start: document.getElementById('ev-start').value,
                end: document.getElementById('ev-end').value,
                location: document.getElementById('ev-location').value,
                desc: document.getElementById('ev-desc').value,
                color: selectedColor
            });
            localStorage.setItem('mailora-events', JSON.stringify(events));
            closeEventModal();
            render();
        }

        function toggleTheme() {
            const html = document.documentElement;
            const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
            html.dataset.theme = next;
            document.getElementById('theme-btn').textContent = next === 'dark' ? '🌙' : '☀️';
        }

        // Init
        render();
    </script>
</body>
</html>
