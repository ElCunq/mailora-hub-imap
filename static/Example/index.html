<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mailora — E-posta İstemcisi</title>
    <meta name="description" content="Mailora - Akıllı e-posta yönetim platformu. Çoklu hesap, AI özet, çeviri, zamanlama ve daha fazlası.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/premium.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">✉</div>
                <span class="logo-text">Mailora</span>
            </div>
            <input type="text" id="search" class="search-box" placeholder="🔍 Ara... (/ tuşu)" oninput="mailora.search(this.value)">
            <div class="header-actions">
                <button class="compose-btn" onclick="mailora.compose()">✏️ Yeni E-posta</button>
                <button class="icon-btn" id="focus-btn" onclick="mailora.toggleFocus()" title="Focus Mode">🎯</button>
                <button class="icon-btn" onclick="mailora.toggleAnalytics()" title="Analytics">📊</button>
                <button class="icon-btn" id="theme-btn" onclick="mailora.toggleTheme()" title="Tema">🌙</button>
            </div>
        </header>

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="section-label">Navigasyon</div>
            <a href="index.html" style="padding:10px 12px;border-radius:10px;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--accent-blue);background:rgba(59,130,246,0.15);font-weight:500;text-decoration:none;margin-bottom:2px">📥 Inbox</a>
            <a href="calendar.html" style="padding:10px 12px;border-radius:10px;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text-secondary);text-decoration:none;margin-bottom:2px">📅 Takvim</a>
            <a href="sheets.html" style="padding:10px 12px;border-radius:10px;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text-secondary);text-decoration:none;margin-bottom:2px">📊 Tablo</a>
            <a href="admin.html" style="padding:10px 12px;border-radius:10px;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text-secondary);text-decoration:none;margin-bottom:2px">🛡️ Admin Panel</a>
            <div class="section-label">Hesaplar</div>
            <div id="account-list"></div>
            <div class="section-label">Klasörler</div>
            <div id="folder-list"></div>
        </aside>

        <!-- Message List -->
        <div class="list-panel">
            <div class="list-header">
                <h3 id="list-title">Inbox</h3>
            </div>
            <div id="message-list"></div>
        </div>

        <!-- Preview Pane -->
        <div class="preview-panel" id="preview-pane">
            <div class="empty-state">
                <div class="empty-icon">📬</div>
                <div>Bir e-posta seçin</div>
            </div>
        </div>
    </div>

    <!-- Compose Modal -->
    <div id="compose-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>✏️ Yeni E-posta</h3>
                <button class="modal-close" onclick="mailora.closeCompose()">✕</button>
            </div>
            <div class="modal-body">
                <input type="text" id="compose-to" class="compose-input" placeholder="Kime">
                <input type="text" id="compose-subject" class="compose-input" placeholder="Konu">
                <textarea id="compose-body" class="compose-textarea" placeholder="Mesajınız..."></textarea>
                <!-- Attachment -->
                <input type="file" id="compose-files" multiple style="display:none" onchange="mailora.handleFileInput(event)">
                <div class="dropzone" id="dropzone" onclick="document.getElementById('compose-files').click()">
                    <div class="dropzone-icon">📎</div>
                    <div class="dropzone-text">Dosya eklemek için tıklayın veya sürükleyin (maks. 10MB)</div>
                </div>
                <div id="attachment-preview"></div>
                <!-- Schedule -->
                <div class="schedule-row">
                    <label><input type="checkbox" id="schedule-check" onchange="document.getElementById('schedule-time').style.display=this.checked?'inline':'none'"> 📅 Zamanla</label>
                    <input type="datetime-local" id="schedule-time" class="schedule-input" style="display:none">
                </div>
            </div>
            <div class="modal-footer">
                <button class="toolbar-btn" onclick="mailora.closeCompose()">İptal</button>
                <button class="send-btn" onclick="mailora.sendEmail()">📤 Gönder</button>
            </div>
        </div>
    </div>

    <!-- Analytics Drawer -->
    <div id="analytics-drawer" class="analytics-drawer">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
            <h3>📊 Analytics</h3>
            <button class="modal-close" onclick="mailora.toggleAnalytics()">✕</button>
        </div>
        <div class="stat-card"><div class="stat-value" id="stat-total">0</div><div class="stat-label">Toplam E-posta</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-sent">0</div><div class="stat-label">Gönderilen</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-received">0</div><div class="stat-label">Alınan</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-response">—</div><div class="stat-label">Ort. Yanıt Süresi</div></div>
        <div class="stat-card"><div class="stat-label" style="margin-bottom:8px">En Çok Yazışılan</div><div id="stat-top" style="font-size:13px"></div></div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
