<!DOCTYPE html>
<html lang="tr" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mailora — Giriş</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/premium.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: var(--bg-primary);
        }

        .login-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            width: 380px;
            max-width: 92vw;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 24px;
        }

        .login-logo .logo-icon {
            font-size: 40px;
            margin-bottom: 8px;
        }

        .login-logo h1 {
            font-size: 24px;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            margin-bottom: 12px;
            box-sizing: border-box;
            transition: var(--transition);
        }

        .login-input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--gradient-primary);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 4px;
        }

        .login-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .login-error {
            color: var(--accent-red);
            font-size: 13px;
            text-align: center;
            min-height: 1.4em;
            margin-bottom: 8px;
        }

        .login-link {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .login-link a {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 500;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-logo">
            <div class="logo-icon">✉</div>
            <h1>Mailora Hub</h1>
        </div>
        <div id="err" class="login-error"></div>
        <form id="loginForm">
            <input type="text" id="username" class="login-input" placeholder="Kullanıcı adı" required>
            <input type="password" id="password" class="login-input" placeholder="Şifre" required>
            <button type="submit" class="login-btn">Giriş Yap</button>
        </form>
        <div class="login-link">
            Hesabınız yok mu? <a href="/static/register.html">Kayıt Ol</a>
        </div>
    </div>
    <script>
        // Already logged in?
        if (localStorage.getItem('auth_token')) { window.location.href = '/'; }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const err = document.getElementById('err');
            err.textContent = '';

            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('auth_token', data.token);
                    localStorage.setItem('auth_user', data.username);
                    localStorage.setItem('auth_role', data.role);
                    window.location.href = '/';
                } else {
                    err.textContent = data.error || 'Giriş başarısız';
                }
            } catch (e) {
                err.textContent = 'Bağlantı hatası';
            }
        });
    </script>
</body>

</html>
