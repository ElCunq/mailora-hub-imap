<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mailora Hub - Calendar</title>
    <link rel="stylesheet" href="/static/index.css">
    <link rel="stylesheet" href="/static/calendar.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="theme-dark">
    <div class="app-container">
        <!-- Sidebar Navigation (Reusable from index.html) -->
        <nav class="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-paper-plane"></i>
                <span>Mailora Hub</span>
            </div>
            <div class="sidebar-menu">
                <a href="/app" class="menu-item"><i class="fas fa-inbox"></i><span>Inbox</span></a>
                <a href="/static/contacts.html" class="menu-item"><i
                        class="fas fa-address-book"></i><span>Contacts</span></a>
                <a href="/static/calendar.html" class="menu-item active"><i
                        class="fas fa-calendar-alt"></i><span>Calendar</span></a>
                <a href="/static/settings.html" class="menu-item"><i class="fas fa-cog"></i><span>Settings</span></a>
            </div>
            <div class="mini-calendar" id="miniCalendar">
                <!-- Tiny calendar widget -->
            </div>
            <div class="calendar-list" id="calendarList">
                <h3>My Calendars</h3>
                <div id="calendarsContainer">
                    <div class="skeleton" style="height: 20px; margin-bottom: 8px;"></div>
                    <div class="skeleton" style="height: 20px; width: 80%;"></div>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <!-- Header -->
            <header class="top-header">
                <div class="header-left">
                    <h2 id="currentPeriod">March 2026</h2>
                    <div class="view-controls">
                        <button class="btn-icon" id="prevPeriod"><i class="fas fa-chevron-left"></i></button>
                        <button class="btn btn-outline" id="todayBtn">Today</button>
                        <button class="btn-icon" id="nextPeriod"><i class="fas fa-chevron-right"></i></button>
                    </div>
                </div>
                <div class="header-center">
                    <div class="view-tabs">
                        <button class="tab-item active" data-view="month">Month</button>
                        <button class="tab-item" data-view="week">Week</button>
                        <button class="tab-item" data-view="day">Day</button>
                    </div>
                </div>
                <div class="header-right">
                    <button class="btn btn-outline" id="exportIcsBtn" title="Export to .ics">
                        <i class="fas fa-file-export"></i>
                    </button>
                    <button class="btn btn-primary" id="addEventBtn">
                        <i class="fas fa-plus"></i> <span>Create</span>
                    </button>
                    <div class="profile-dropdown" id="profileBtn">
                        <img src="https://ui-avatars.com/api/?name=User&background=6366f1&color=fff" alt="Profile">
                    </div>
                </div>
            </header>

            <!-- Calendar Display Area -->
            <div class="calendar-wrapper">
                <div id="calendarGrid" class="calendar-grid month-view">
                    <!-- Weekdays Header -->
                    <div class="grid-header">Sun</div>
                    <div class="grid-header">Mon</div>
                    <div class="grid-header">Tue</div>
                    <div class="grid-header">Wed</div>
                    <div class="grid-header">Thu</div>
                    <div class="grid-header">Fri</div>
                    <div class="grid-header">Sat</div>
                    <!-- Days will be injected here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Create/Edit Event Modal -->
    <div class="modal-overlay" id="eventModal">
        <div class="modal-content">
            <header class="modal-header">
                <h3>New Event</h3>
                <button class="close-modal"><i class="fas fa-times"></i></button>
            </header>
            <form id="eventForm" class="modal-body">
                <input type="text" id="eventTitle" placeholder="Add title" required class="input-title">

                <div class="form-row">
                    <i class="far fa-clock"></i>
                    <div class="datetime-pickers">
                        <input type="date" id="startDate" required>
                        <input type="time" id="startTime">
                        <span>to</span>
                        <input type="time" id="endTime">
                        <input type="date" id="endDate" required>
                    </div>
                </div>

                <div class="form-row">
                    <i class="fas fa-rotate"></i>
                    <select id="eventRRule">
                        <option value="">Does not repeat</option>
                        <option value="FREQ=DAILY">Daily</option>
                        <option value="FREQ=WEEKLY">Weekly</option>
                        <option value="FREQ=MONTHLY">Monthly</option>
                    </select>
                </div>

                <div class="form-row">
                    <i class="fas fa-map-marker-alt"></i>
                    <input type="text" id="eventLocation" placeholder="Add location">
                </div>

                <div class="form-row">
                    <i class="fas fa-align-left"></i>
                    <textarea id="eventDescription" placeholder="Add description" rows="3"></textarea>
                </div>

                <div class="form-row">
                    <i class="fas fa-calendar-check"></i>
                    <select id="calendarSelect">
                        <!-- Options injected via JS -->
                    </select>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-outline" id="cancelEvent">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Event</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/calendar.js" type="module"></script>
</body>

</html>
